<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; }
        .navbar-brand img { height: 50px; }
    </style>
</head>
<body class="wrapper">
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="navbar-brand">
            <a th:href="@{/}"><img th:src="@{/images/Ally-logo.png}" alt="Ally" class="logo" onerror="this.style.display='none'"/><span th:unless="${#request.getRequestURI().contains('admin')}">Ally</span></a>
            <span sec:authorize="hasRole('ADMIN')" class="text-success ml-2">管理者ログイン中</span>
        </div>
        <ul class="navbar-nav ml-auto">
            <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                <a class="nav-link" th:href="@{/admin/users}"><i class="far fa-address-book"></i> Users</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                <a class="nav-link" th:href="@{/admin/genres}"><i class="fas fa-list-ul"></i> Genres</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                <a class="nav-link" th:href="@{/admin/subjects}"><i class="fas fa-pen-fancy"></i> Subjects</a>
            </li>
            <li sec:authorize="isAuthenticated()" class="nav-item" th:if="${#authorization.expression('!hasRole(\'ADMIN\')')}">
                <a class="nav-link" th:href="@{/users/{id}(id=${#authentication.principal.user.id})}"><i class="fas fa-home"></i> My page</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/genres}"><i class="fas fa-list-ul"></i> Genres</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/subjects}"><i class="fas fa-pen-fancy"></i> Subjects</a>
            </li>
            <li sec:authorize="isAuthenticated()" class="nav-item" th:if="${#authorization.expression('!hasRole(\'ADMIN\')')}">
                <a class="nav-link" th:href="@{/books/search}"><i class="fas fa-book-medical"></i> New post</a>
            </li>
            <li sec:authorize="isAuthenticated()" class="nav-item">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-link nav-link p-0"><i class="fas fa-sign-out-alt"></i> Log out</button>
                </form>
            </li>
            <li sec:authorize="!isAuthenticated()" class="nav-item">
                <a class="nav-link" th:href="@{/signup}"><i class="fas fa-user-plus"></i> Sign up</a>
            </li>
            <li sec:authorize="!isAuthenticated()" class="nav-item">
                <a class="nav-link" th:href="@{/login}"><i class="fas fa-sign-in-alt"></i> Log in</a>
            </li>
        </ul>
        <form sec:authorize="isAuthenticated()" th:action="@{/searches/search}" method="get" class="form-inline ml-2">
            <input type="text" name="keyword" placeholder="キーワード" class="form-control mr-1"/>
            <select name="model" class="form-control mr-1">
                <option value="user">ユーザー</option>
                <option value="book">参考書</option>
            </select>
            <button type="submit" class="btn btn-outline-secondary">検索</button>
        </form>
    </nav>
</header>
<main class="container my-4">
    <div th:if="${createSuccess}" class="alert alert-success" th:text="${createSuccess}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${notice}" class="alert alert-info" th:text="${notice}"></div>
    <div th:if="${alert}" class="alert alert-danger" th:text="${alert}"></div>
    <div th:replace="~{::content}">Content</div>
</main>
<footer class="text-center py-3">
    <strong>© All rights reserved by Ally for learners</strong>
    <div><a th:href="@{/admin/login}"><i class="fas fa-lock"></i></a></div>
</footer>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
