<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sign up - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4">Sign up</h2>
            <div th:if="${alert}" class="alert alert-danger" th:text="${alert}"></div>
            <form th:action="@{/signup}" method="post">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required minlength="6"/>
                </div>
                <div class="form-group">
                    <label for="name">Name (2-20)</label>
                    <input type="text" id="name" name="name" class="form-control" required minlength="2" maxlength="20"/>
                </div>
                <div class="form-group">
                    <label for="nickName">Nick name (2-20)</label>
                    <input type="text" id="nickName" name="nickName" class="form-control" required minlength="2" maxlength="20"/>
                </div>
                <button type="submit" class="btn btn-primary">Sign up</button>
            </form>
            <p class="mt-3"><a th:href="@{/login}">Log in</a></p>
        </div>
    </div>
</div>
</body>
</html>
