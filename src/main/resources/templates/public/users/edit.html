<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Edit - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Edit profile</h1>
    <form th:action="@{/users/{id}(id=${user.id})}" method="post">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" th:value="${user.name}" class="form-control" required minlength="2" maxlength="20"/>
        </div>
        <div class="form-group">
            <label>Nick name</label>
            <input type="text" name="nickName" th:value="${user.nickName}" class="form-control" required minlength="2" maxlength="20"/>
        </div>
        <div class="form-group">
            <label>Profile</label>
            <textarea name="profile" class="form-control" th:text="${user.profile}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
</body>
</html>
