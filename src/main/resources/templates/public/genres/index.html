<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Genres - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Genres</h1>
    <ul th:each="g : ${genres}">
        <li><a th:href="@{/genres/{id}(id=${g.id})}" th:text="${g.name}">Genre</a></li>
    </ul>
</div>
</body>
</html>
