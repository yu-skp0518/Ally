<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Followings - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1 th:text="${user.nickName} + ' - Followings'">Followings</h1>
    <ul th:each="u : ${followings}">
        <li><a th:href="@{/users/{id}(id=${u.id})}" th:text="${u.nickName}">User</a></li>
    </ul>
</div>
</body>
</html>
