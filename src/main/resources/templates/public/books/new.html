<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>New post - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>New post</h1>
    <img th:src="${rakutenItem.smallImageUrl}" alt="cover" style="max-width:100px;"/>
    <p th:text="${rakutenItem.title}">Title</p>
    <form th:action="@{/books}" method="post">
        <input type="hidden" name="isbn" th:value="${book.isbn}"/>
        <input type="hidden" name="title" th:value="${book.title}"/>
        <input type="hidden" name="author" th:value="${book.author}"/>
        <input type="hidden" name="itemCaption" th:value="${book.itemCaption}"/>
        <input type="hidden" name="itemUrl" th:value="${book.itemUrl}"/>
        <input type="hidden" name="publisherName" th:value="${book.publisherName}"/>
        <input type="hidden" name="itemPrice" th:value="${book.itemPrice}"/>
        <input type="hidden" name="largeImageUrl" th:value="${book.largeImageUrl}"/>
        <input type="hidden" name="mediumImageUrl" th:value="${book.mediumImageUrl}"/>
        <input type="hidden" name="smallImageUrl" th:value="${book.smallImageUrl}"/>
        <div class="form-group">
            <label>Story (max 300)</label>
            <textarea name="story" class="form-control" maxlength="300" required th:value="${book.story}"></textarea>
        </div>
        <div class="form-group">
            <label>Rate (0-5)</label>
            <input type="number" name="rate" step="0.1" min="0" max="5" class="form-control" th:value="${book.rate}"/>
        </div>
        <div class="form-group">
            <label>Genre</label>
            <select name="genreId" class="form-control" required>
                <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}">Genre</option>
            </select>
        </div>
        <div class="form-group">
            <label>Subject</label>
            <select name="subjectId" class="form-control" required>
                <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.name}">Subject</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>
</body>
</html>
