<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Search - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Search Rakuten Books</h1>
    <form th:action="@{/books/search}" method="get" class="mb-4">
        <input type="text" name="keyword" placeholder="Keyword" class="form-control d-inline-block w-50"/>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>
    <p th:if="${notice}" class="text-info" th:text="${notice}"></p>
    <p th:if="${alert}" class="text-danger" th:text="${alert}"></p>
    <div class="row" th:if="${rakutenBooks != null and !rakutenBooks.empty}">
        <div class="col-md-4" th:each="item : ${rakutenBooks}">
            <div class="card mb-3">
                <img th:src="${item.smallImageUrl}" class="card-img-top" alt="cover" style="height:120px;object-fit:contain;"/>
                <div class="card-body">
                    <h6 th:text="${item.title}">Title</h6>
                    <p class="small" th:text="${item.author}">Author</p>
                    <a th:href="@{/books/new(isbn=${item.isbn})}">Post this book</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
