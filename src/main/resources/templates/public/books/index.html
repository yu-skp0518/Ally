<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Books - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Books</h1>
    <div class="row" th:if="${books != null and !books.empty}">
        <div class="col-md-4" th:each="book : ${books.content}">
            <div class="card mb-3">
                <img th:src="${book.smallImageUrl}" class="card-img-top" alt="cover" style="height:120px;object-fit:contain;"/>
                <div class="card-body">
                    <h6 th:text="${book.title}">Title</h6>
                    <a th:href="@{/books/show/{id}(id=${book.id})}">View</a>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${books != null and books.totalPages > 1}">
        <a th:href="@{/books(page=${books.number - 1})}" th:if="${books.hasPrevious()}">Prev</a>
        <span th:text="${books.number + 1} + '/' + ${books.totalPages}">1/1</span>
        <a th:href="@{/books(page=${books.number + 1})}" th:if="${books.hasNext()}">Next</a>
    </div>
</div>
</body>
</html>
