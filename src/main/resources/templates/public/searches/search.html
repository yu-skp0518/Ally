<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Search - Ally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Search</h1>
    <form th:action="@{/searches/search}" method="get">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Keyword"/>
        <select name="model">
            <option value="user">User</option>
            <option value="book">Book</option>
        </select>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>
    <div th:if="${users != null and !users.empty}">
        <h3>Users</h3>
        <ul th:each="u : ${users.content}">
            <li><a th:href="@{/users/{id}(id=${u.id})}" th:text="${u.nickName}">User</a></li>
        </ul>
    </div>
    <div th:if="${books != null and !books.empty}">
        <h3>Books</h3>
        <ul th:each="b : ${books.content}">
            <li><a th:href="@{/books/show/{id}(id=${b.id})}" th:text="${b.title}">Book</a></li>
        </ul>
    </div>
</div>
</body>
</html>
