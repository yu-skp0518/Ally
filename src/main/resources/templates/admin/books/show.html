<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${book.title}">Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1 th:text="${book.title}">Book</h1>
    <p th:text="${book.author}">Author</p>
    <form th:action="@{/admin/books/{id}(id=${book.id})}" method="post">
        <label><input type="checkbox" name="isDeleted" th:checked="${book.isDeleted}"/> Deleted</label>
        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>
</body>
</html>
