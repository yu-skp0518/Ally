<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${subject.name}">Subject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1 th:text="${subject.name}">Subject</h1>
    <form th:action="@{/admin/subjects/{id}(id=${subject.id})}" method="post">
        <input type="text" name="name" th:value="${subject.name}"/>
        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>
</body>
</html>
