<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Subjects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Subjects</h1>
    <ul th:each="s : ${subjects}">
        <li><a th:href="@{/admin/subjects/{id}(id=${s.id})}" th:text="${s.name}">Subject</a></li>
    </ul>
</div>
</body>
</html>
