<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Genres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container">
    <h1>Genres</h1>
    <form th:action="@{/admin/genres}" method="post" class="mb-3">
        <input type="text" name="name" placeholder="New genre" required/>
        <button type="submit" class="btn btn-primary">Add</button>
    </form>
    <ul th:each="g : ${genres}">
        <li><a th:href="@{/admin/genres/{id}(id=${g.id})}" th:text="${g.name}">Genre</a></li>
    </ul>
</div>
</body>
</html>
