# 開発用: PostgreSQL なしで起動（H2 メモリDB）
# 使い方: .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=dev
spring:
  datasource:
    url: jdbc:h2:mem:ally;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080
